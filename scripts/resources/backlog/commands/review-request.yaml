description: 'Submit the agent''s active entry (task or feature) for review'
examples:
  - 'SOMANAGER_AGENT=agent-01 php scripts/backlog.php review-request'
notes:
  - 'Replaces both task-review-request and feature-review-request.'
  - 'Detects automatically whether the active entry is a task or a feature.'
  - 'For a task: rebases the task branch on its parent feature branch, runs the review script, refreshes meta.base, and moves the task to the review stage.'
  - 'For a feature: verifies no active child tasks remain, refreshes origin/main, rebases the feature branch on origin/main, runs the review script, refreshes meta.base, and moves the feature to the review stage.'
  - 'If the rebase fails (typically a conflict), the rebase is aborted (leaving the worktree clean), the command stops with a recovery hint, the entry stays in development, and the mechanical review is not run. Update the branch manually in the worktree (rebase or merge onto the target and resolve the conflicts), then rerun review-request.'
  - 'The command does not print the full mechanical review report on stdout. It prints a short pointer with the global PASS/FAIL status, the saved report absolute path in the WA, and the report length. Open that file with the Read tool for details.'
  - 'If the mechanical review fails, the pointer is printed before the command error is raised, and the complete report remains available at the printed absolute path in the WA.'
  - 'The feature must have an assigned developer (run assign first if needed).'
  - 'After a successful transition to review, if the entry has a registered reviewer with a live tmux session, review-request injects a prompt into that session to resume the review. This notification is best-effort: any failure (absent session, dead session, non-tmux driver, incoherent worktree, injection failure) is silently ignored and review-request still succeeds. The feature is enabled when the board carries config.review_resume.enabled: true or the reviewer session was launched with --review-resume=on. It is disabled when the board config is absent or false and the session has no override.'
  - 'review-request always clears the submit-ready metadata key from the entry, whether the mechanical review passes or fails. This happens even when review-request is called without a prior submit-check.'
