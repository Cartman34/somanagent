description: 'Update the recorded Git base for an active feature or task after a rebase'
arguments:
  -
    name: '<feature|feature/task>'
    description: 'Feature slug or task review key to update'
options:
  -
    name: '--base'
    description: 'Explicit Git ref to record instead of the automatically resolved merge base'
examples:
  - 'php scripts/backlog.php base-update delete-question-reply'
  - 'php scripts/backlog.php base-update onboarding/task-copy-review'
  - 'php scripts/backlog.php base-update onboarding/task-copy-review --base=HEAD~3'
notes:
  - 'Without --base, features update origin/main first, then use the merge base between origin/main and their branch.'
  - 'Without --base, local child tasks use the merge base between their parent feature branch and their task branch.'
  - 'Child tasks must be targeted with the full <feature/task> reference; a bare task slug is never accepted.'
  - 'The selected base must resolve to a commit and be an ancestor of the entry branch.'
  - '--base is exceptional: use it only when the automatically resolved merge base is incorrect and you have a specific, validated Git ref to substitute.'
