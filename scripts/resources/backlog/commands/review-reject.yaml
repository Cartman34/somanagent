description: 'Reject a feature or task review and record reviewer blockers'
arguments:
  -
    name: '<entry-ref>'
    description: 'Entry reference to reject'
options:
  -
    name: '--body-file'
    description: 'Local file containing one plain rejection finding per line (required)'
examples:
  - 'SOMANAGER_AGENT=r01 php scripts/backlog.php review-reject delete-question-reply --body-file local/tmp/review.md'
  - 'SOMANAGER_AGENT=r01 php scripts/backlog.php review-reject onboarding/task-copy-review --body-file local/tmp/review.md'
notes:
  - 'Use <entry-ref> for both feature and child task entries.'
  - 'Short task references (bare task slug without the parent feature) are refused; use <entry-ref>.'
  - 'The body file must contain plain findings only: one finding per line, optional leading numbers or bullets, no Markdown headings.'
