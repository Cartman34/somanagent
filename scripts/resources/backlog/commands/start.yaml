description: 'Start work on a queued backlog task, optionally targeting an explicit reference'
arguments:
  -
    name: '[<entry-ref>]'
    description: 'Optional stable reference exposed by `list --stage=todo`. When omitted, start consumes the first queued entry implicitly.'
options:
  -
    name: '--branch-type'
    description: 'Override branch type. Allowed values: feat, fix, tech (rejected if unknown).'
examples:
  - 'SOMANAGER_AGENT=agent-01 php scripts/backlog.php start'
  - 'SOMANAGER_AGENT=agent-01 php scripts/backlog.php start my-feature'
  - 'SOMANAGER_AGENT=agent-01 php scripts/backlog.php start my-feature/my-task'
  - 'SOMANAGER_AGENT=agent-01 php scripts/backlog.php start --branch-type=fix'
  - 'SOMANAGER_AGENT=agent-01 php scripts/backlog.php start --branch-type=tech'
  - 'SOMANAGER_AGENT=agent-01 php scripts/backlog.php start --dry-run'
notes:
  - 'Without a target, reads the next queued entry from the board `To do` section.'
  - 'With an explicit target, locates the first queued entry whose `[feature-slug]` or `[feature-slug][task-slug]` prefix matches the reference exposed by `list --stage=todo`. Refuses with a clear error when the reference does not match any queued entry.'
  - 'Only entries carrying a `[feature-slug]` or `[feature-slug][task-slug]` prefix have a stable reference; bare text entries can only be taken implicitly without a target.'
  - 'Automated workflows must always pass an explicit target; relying on the implicit head of the list is reserved for interactive usage.'
  - 'Refuses if the agent already has any active entry (kind=task or kind=feature), with one exception: allows starting a scoped child task (no explicit target only) when the agent''s only active entry is the parent feature container for that task (auto-assigned by merge on a prior task merge).'
  - 'Accepts plain task text and derives the feature slug from that text.'
  - 'Accepts task type prefixes [feat], [fix] and [tech] (case-insensitive). The prefix may appear at any position in the leading bracket sequence.'
  - 'Accepts a single feature prefix [feature-slug] to create a plain kind=feature with the explicit slug.'
  - 'Accepts scoped task entries in the form [feature-slug][task-slug] Task text to start or attach a local child task under an existing unassigned parent feature container.'
  - 'Combinations are explicit: [type][feature-slug] text, [type][feature-slug][task-slug] text, [feature-slug][type] text, [feature-slug][task-slug][type] text are all valid; only one type prefix is allowed per entry.'
  - 'Branch prefix matches the type 1:1: feat → feat/<slug>, fix → fix/<slug>, tech → tech/<slug> for plain features and feat/<feature>--<task>, fix/<feature>--<task>, tech/<feature>--<task> for scoped tasks.'
  - 'Validates the queued entry fully (type, feature and task slugs, conflicts) before any worktree, branch or backlog mutation. A refusal leaves no leftover worktree or backlog state.'
  - 'Started entry blocks and dry-run output include `Entry-ref:` as the authoritative value to copy into later backlog commands; branch lines remain informational.'
  - 'With --dry-run, prints the resolved interpretation (entry-ref, kind, type, feature, task, branches) and performs no Git, worktree or backlog mutation. Git reads (fetch/origin/main) remain enabled.'
  - 'When starting a scoped child task ([feature-slug][task-slug]) whose parent feature is in review, reviewing, or approved stage, the parent is automatically reverted to development and meta.reviewer is cleared. A message is printed to signal the revert.'
