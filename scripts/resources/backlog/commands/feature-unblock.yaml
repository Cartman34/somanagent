description: 'Remove the blocked flag from one feature'
arguments:
  -
    name: '[<feature>]'
    description: 'Optional explicit feature slug'
examples:
  - 'SOMANAGER_AGENT=agent-01 php scripts/backlog.php feature-unblock'
  - 'SOMANAGER_AGENT=agent-01 php scripts/backlog.php feature-unblock delete-question-reply'
  - 'SOMANAGER_ROLE=manager SOMANAGER_AGENT=m01 php scripts/backlog.php feature-unblock delete-question-reply'
notes:
  - 'Without an explicit feature argument, resolves the single active feature assigned to the caller agent.'
  - 'With SOMANAGER_ROLE=manager, <feature> is mandatory and may target an unassigned feature.'
  - 'Developer and reviewer callers remain restricted to features assigned to the caller agent.'
  - 'If the feature already has a PR, the command restores the current non-blocked PR title.'
