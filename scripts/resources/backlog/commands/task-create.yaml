description: 'Append one new task from --body-file at the end of the todo section'
options:
  -
    name: '--position'
    description: 'Insert at start, index, or end (default: end)'
  -
    name: '--index'
    description: '1-based insert position used with --position=index'
  -
    name: '--body-file'
    description: 'Path to a file containing the task body (required; typically under local/tmp/)'
examples:
  - 'php scripts/backlog.php task-create --body-file=local/tmp/new-task.md'
  - 'php scripts/backlog.php task-create --body-file=local/tmp/new-task.md --position=start'
  - 'php scripts/backlog.php task-create --body-file=local/tmp/new-task.md --position=index --index=2'
notes:
  - 'If the new task is a scoped child task ([feature-slug][task-slug]) and the parent feature is in review, reviewing, or approved stage, the parent is automatically reverted to development and meta.reviewer is cleared. A message is printed to signal the revert.'
  - 'Required: --body-file=<path> is mandatory. Inline positional task text is no longer accepted.'
  - 'Body file format: first non-empty line is the task title; subsequent non-empty lines become indented sub-tasks (auto-indented to two spaces when missing). An optional leading "- " on the first line is accepted and stripped.'
  - 'Body markdown: bullet lists (nested, any depth) and inline formatting only (bold, italic, inline code). No headers, code blocks, tables, blockquotes, hr, or paragraphs outside bullets — anything else is squashed into bullets and detail is lost. Long content goes to local/specs/<feature>-spec.md, referenced from a bullet.'
  - 'Required: every task must declare an explicit [feature-slug] scope (and [task-slug] for child tasks). Tasks without a feature scope are rejected. Use [feature-slug] Title, [feature-slug][task-slug] Title, or [type][feature-slug] Title — for example: [tech][my-feature] My task title.'
  - 'A [type] prefix (feat / fix / tech) is recommended alongside the required [feature-slug] so the queued entry is unambiguous and the task-remove reference stays stable.'
  - '`--index` values are advisory: out-of-range values clamp to start (>=1) or end (<= entryCount + 1) and emit a warning, while the task is still inserted; passing `--position=index` without `--index` is rejected.'
  - 'Supported task type prefixes: [feat], [fix], [tech] (case-insensitive). Only one type prefix is allowed per entry.'
  - 'Type prefix is recognized at any position in the leading bracket sequence: [type][feature-slug][task-slug] text, [feature-slug][type] text and [feature-slug][task-slug][type] text all work.'
