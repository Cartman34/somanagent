description: 'Append one new task at the end of the todo section'
arguments:
  -
    name: '<text>'
    description: 'Task text to append to the todo section (omit when --body-file is used)'
options:
  -
    name: '--position'
    description: 'Insert at start, index, or end (default: end)'
  -
    name: '--index'
    description: '1-based insert position used with --position=index'
  -
    name: '--body-file'
    description: 'Read the task body from a file (typically under local/tmp/) for multi-line tasks; cannot be combined with positional <text>'
examples:
  - 'php scripts/backlog.php task-create "[feat][audit-trail] Add audit trail view"'
  - 'php scripts/backlog.php task-create "[fix][snapshot-bug] Fix snapshot crash"'
  - 'php scripts/backlog.php task-create "[tech][backlog-entry-types] Centralize task types"'
  - 'php scripts/backlog.php task-create "[feat][workspace-worktree][wws-init] Verify gitignore setup" --position=index --index=2'
  - "php scripts/backlog.php task-create $'[tech][backlog-entry-types] Multi-line task title\\n  - First sub-task\\n  - Second sub-task'"
  - 'php scripts/backlog.php task-create --body-file=local/tmp/new-task.md'
notes:
  - 'Recommended: always include both a [type] prefix (feat / fix / tech) and a [feature-slug] (and [task-slug] when the task is a child) so the queued entry is unambiguous and the task-remove reference stays stable.'
  - '`--index` values are advisory: out-of-range values clamp to start (>=1) or end (<= entryCount + 1) and emit a warning, while the task is still inserted; passing `--position=index` without `--index` is rejected.'
  - 'Supported task type prefixes: [feat], [fix], [tech] (case-insensitive). Only one type prefix is allowed per entry.'
  - 'Type prefix is recognized at any position in the leading bracket sequence: [type][feature-slug][task-slug] text, [feature-slug][type] text and [feature-slug][task-slug][type] text all work.'
  - 'Supports scoped task prefixes [feature-slug][task-slug] for child tasks attached to a parent feature container.'
  - 'Multi-line tasks: the first non-empty line is the task title; subsequent non-empty lines are stored as indented sub-tasks (auto-indented to two spaces when missing).'
  - '--body-file expects the same multi-line format as a direct multi-line argument; an optional leading "- " on the first line is accepted and stripped.'
