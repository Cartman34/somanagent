description: 'Append one new task at the end of the todo section'
arguments:
  -
    name: '<text>'
    description: 'Task text to append to the todo section (omit when --body-file is used)'
options:
  -
    name: '--position'
    description: 'Insert at start, index, or end (default: end)'
  -
    name: '--index'
    description: '1-based insert position used with --position=index'
  -
    name: '--body-file'
    description: 'Read the task body from a file (typically under local/tmp/) for multi-line tasks; cannot be combined with positional <text>'
examples:
  - 'php scripts/backlog.php task-create "Add toast notifications on success and error flows"'
  - 'php scripts/backlog.php task-create "[feat] Add audit trail view" --position=start'
  - 'php scripts/backlog.php task-create "[workspace-worktree][wws-init] Verify gitignore setup" --position=index --index=2'
  - "php scripts/backlog.php task-create $'[feat] Multi-line task title\\n  - First sub-task\\n  - Second sub-task'"
  - 'php scripts/backlog.php task-create --body-file=local/tmp/new-task.md'
notes:
  - 'Supports optional task type prefixes such as [feat] or [fix].'
  - 'Supports optional scoped task prefixes such as [feature-slug][task-slug].'
  - 'Multi-line tasks: the first non-empty line is the task title; subsequent non-empty lines are stored as indented sub-tasks (auto-indented to two spaces when missing).'
  - '--body-file expects the same multi-line format as a direct multi-line argument; an optional leading "- " on the first line is accepted and stripped.'
