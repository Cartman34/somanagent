description: 'Rebase an active entry branch onto its canonical target and push on success.'
arguments:
  - name: '<slug>'
    description: 'Entry reference: a feature slug (e.g. my-feature) or a task reference (e.g. my-feature/my-task)'
options:
  - name: '--dry-run'
    description: 'Check whether a rebase is needed without executing it'
examples:
  - 'SOMANAGER_ROLE=developer SOMANAGER_AGENT=d10 php scripts/backlog.php entry-rebase my-feature'
  - 'SOMANAGER_ROLE=developer SOMANAGER_AGENT=d10 php scripts/backlog.php entry-rebase my-feature/my-task'
  - 'SOMANAGER_ROLE=developer SOMANAGER_AGENT=d10 php scripts/backlog.php entry-rebase my-feature --dry-run'
notes:
  - 'Target branch resolution: task → parent feature branch; root feature → origin/main (fetched first).'
  - 'Already up to date: prints "Already up to date with <target>" and exits 0 — no rebase or push performed.'
  - 'Clean rebase: rebases the branch onto the target, pushes with --force-with-lease (features only — tasks are local-only), and exits 0.'
  - 'On both up-to-date and clean-rebase outcomes, meta.base is refreshed in the backlog board automatically. Manual base-update is not required.'
  - 'Conflict: prints the conflicting file list and exits non-zero; the worktree is left in "rebase in progress" state for manual resolution.'
  - 'Task branches are never pushed; push only applies to root feature branches.'
  - 'The agent launcher uses this service automatically when a developer has an approved entry: rebase succeeds → no agent launched; conflict → agent launched with a conflict-resolution prompt.'
  - 'Use this command instead of raw git rebase to ensure consistent handling (fetch, rebase, push) in one step.'
