description: 'Release a reviewing entry back to the review stage'
arguments:
  -
    name: '<feature|feature/task>'
    description: 'Entry reference to release (required: stable slug, no implicit resolution by agent)'
options:
  -
    name: '--agent'
    description: 'Reviewer agent code (required)'
examples:
  - 'php scripts/backlog.php review-cancel my-feature --agent cp-01'
  - 'php scripts/backlog.php review-cancel my-feature/my-task --agent cp-01'
notes:
  - 'Moves the entry from reviewing back to review and clears the recorded reviewer.'
  - 'Always require an explicit reference: review-cancel never auto-resolves the entry from the agent code, so the mutation cannot silently retarget another claim.'
  - 'Only the reviewer who claimed the entry (via review-next) may cancel it; the cancellation is verified against the entry''s stored reviewer before the board is saved.'
  - 'A manager (SOMANAGER_ROLE=manager) may force-cancel any stuck reviewing entry, still by explicit reference.'
