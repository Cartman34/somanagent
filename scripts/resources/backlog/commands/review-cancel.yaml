description: 'Release a reviewing entry back to the review stage'
arguments:
  -
    name: '<feature|feature/task>'
    description: 'Entry reference to release (optional: defaults to the reviewer''s single reviewing entry)'
options:
  -
    name: '--agent'
    description: 'Reviewer agent code (required)'
examples:
  - 'php scripts/backlog.php review-cancel --agent cp-01'
  - 'php scripts/backlog.php review-cancel my-feature --agent cp-01'
  - 'php scripts/backlog.php review-cancel my-feature/my-task --agent cp-01'
notes:
  - 'Moves the entry from reviewing back to review and clears the recorded reviewer.'
  - 'Only the reviewer who claimed the entry (via review-next) may cancel it.'
  - 'A manager (SOMANAGER_ROLE=manager) may force-cancel any stuck reviewing entry.'
  - 'When no reference is given, resolves to the reviewer''s single reviewing entry; fails if none or ambiguous.'
