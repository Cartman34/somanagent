description: 'List backlog entries across all sections (queued and active), with optional stage filtering and output format control'
options:
  -
    name: '--stage'
    description: 'Show only entries in the given stage. Repeatable and accepts CSV (e.g. --stage=todo,review). Allowed values: todo, development, review, reviewing, approved, rejected. Mutually exclusive with --no-stage.'
  -
    name: '--no-stage'
    description: 'Exclude entries in the given stage from the full list. Repeatable and accepts CSV. Same allowed values as --stage. Mutually exclusive with --stage.'
  -
    name: '--format'
    description: 'Output format. Allowed values: default (rich line with all fields), numbered (same with N. prefix), ref (one stable ref per line), json (structured array). Default: default.'
  -
    name: '--flat'
    description: 'Suppress stage headers. Requires --stage with exactly one value; incompatible with --no-stage or multiple stages.'
examples:
  - 'php scripts/backlog.php list'
  - 'php scripts/backlog.php list --stage=todo'
  - 'php scripts/backlog.php list --stage=review'
  - 'php scripts/backlog.php list --stage=todo,development'
  - 'php scripts/backlog.php list --stage=todo --stage=development'
  - 'php scripts/backlog.php list --no-stage=approved --no-stage=rejected'
  - 'php scripts/backlog.php list --stage=review --flat'
  - 'php scripts/backlog.php list --format=numbered'
  - 'php scripts/backlog.php list --format=ref'
  - 'php scripts/backlog.php list --format=json'
notes:
  - 'Without filters, all sections are shown grouped by stage with a header per stage.'
  - 'Each line includes the stable ref, kind, agent (developer), pr, reviewer, and title.'
  - 'Absent fields are shown as `none`, not omitted — pr=none applies to tasks and features alike.'
  - 'The blocked=yes indicator is appended when an entry is blocked.'
  - 'Stage values: todo (queued section), development, review, reviewing, approved, rejected.'
  - '--flat requires --stage with exactly one value; zero values, multiple values, or --no-stage instead of --stage all produce an explicit error.'
