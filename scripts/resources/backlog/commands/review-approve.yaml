description: 'Approve a feature or task review'
arguments:
  -
    name: '<entry-ref>'
    description: 'Entry reference to approve'
options:
  -
    name: '--body-file'
    description: 'Local file used for the PR update body (required for feature approvals, rejected for task approvals)'
examples:
  - 'SOMANAGER_AGENT=r01 php scripts/backlog.php review-approve delete-question-reply --body-file local/tmp/pr_body.md'
  - 'SOMANAGER_AGENT=r01 php scripts/backlog.php review-approve onboarding/task-copy-review'
notes:
  - 'Relative --body-file paths resolve first against the developer WA (from entry meta.developer), then cwd. Absolute paths are used as-is.'
  - 'Use <entry-ref> for both feature and child task entries.'
  - 'Short task references (bare task slug without the parent feature) are refused; use <entry-ref>.'
  - '--body-file is required for feature approvals and rejected for task approvals.'
  - 'When approval follows a reviewing claim, meta.reviewer is preserved until merge as the last reviewer who acted on the entry.'
  - 'For feature approvals: refused if the feature has any active child task branches (kind=task in In progress) or any queued child tasks (in To do). Both guards must pass before the approval proceeds.'
