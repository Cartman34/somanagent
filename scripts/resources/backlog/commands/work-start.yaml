description: 'Start work on a queued backlog task, optionally targeting an explicit reference'
arguments:
  -
    name: '[<feature|feature/task>]'
    description: 'Optional stable reference exposed by `todo-list`. When omitted, work-start consumes the first queued entry implicitly.'
options:
  -
    name: '--agent'
    description: 'Developer agent code that takes the next task'
  -
    name: '--branch-type'
    description: 'Override branch type. Allowed values: feat, fix, tech (rejected if unknown).'
examples:
  - 'php scripts/backlog.php work-start --agent agent-01'
  - 'php scripts/backlog.php work-start --agent agent-01 my-feature'
  - 'php scripts/backlog.php work-start --agent agent-01 my-feature/my-task'
  - 'php scripts/backlog.php work-start --agent agent-01 --branch-type=fix'
  - 'php scripts/backlog.php work-start --agent agent-01 --branch-type=tech'
  - 'php scripts/backlog.php work-start --agent agent-01 --dry-run'
notes:
  - 'Without a target, reads the next queued entry from the board `To do` section.'
  - 'With an explicit target, locates the first queued entry whose `[feature-slug]` or `[feature-slug][task-slug]` prefix matches the reference exposed by `todo-list`. Refuses with a clear error when the reference does not match any queued entry.'
  - 'Only entries carrying a `[feature-slug]` or `[feature-slug][task-slug]` prefix have a stable reference; bare text entries can only be taken implicitly without a target.'
  - 'Automated workflows must always pass an explicit target; relying on the implicit head of the list is reserved for interactive usage.'
  - 'Refuses if the agent already has any active entry (kind=task or kind=feature), with one exception: allows starting a scoped child task (no explicit target only) when the agent''s only active entry is the parent feature container for that task (auto-assigned by feature-task-merge on a prior task merge).'
  - 'Accepts plain task text and derives the feature slug from that text.'
  - 'Accepts task type prefixes [feat], [fix] and [tech] (case-insensitive). The prefix may appear at any position in the leading bracket sequence.'
  - 'Accepts a single feature prefix [feature-slug] to create a plain kind=feature with the explicit slug.'
  - 'Accepts scoped task entries in the form [feature-slug][task-slug] Task text to start or attach a local child task under an existing unassigned parent feature container.'
  - 'Combinations are explicit: [type][feature-slug] text, [type][feature-slug][task-slug] text, [feature-slug][type] text, [feature-slug][task-slug][type] text are all valid; only one type prefix is allowed per entry.'
  - 'Branch prefix matches the type 1:1: feat → feat/<slug>, fix → fix/<slug>, tech → tech/<slug> for plain features and feat/<feature>--<task>, fix/<feature>--<task>, tech/<feature>--<task> for scoped tasks.'
  - 'Validates the queued entry fully (type, feature/task slugs, conflicts) before any worktree, branch or backlog mutation. A refusal leaves no leftover worktree or backlog state.'
  - 'With --dry-run, prints the resolved interpretation (kind, type, feature, task, branches) and performs no Git, worktree or backlog mutation. Git reads (fetch/origin/main) remain enabled.'
