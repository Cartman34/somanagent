description: 'Return one untouched active feature or task back to the todo section'
arguments:
  -
    name: '[<entry-ref>]'
    description: 'Optional for developer/reviewer callers; mandatory when SOMANAGER_ROLE=manager.'
examples:
  - 'SOMANAGER_AGENT=agent-01 php scripts/backlog.php release'
  - 'SOMANAGER_AGENT=agent-01 php scripts/backlog.php release delete-question-reply'
  - 'SOMANAGER_ROLE=manager SOMANAGER_AGENT=m01 php scripts/backlog.php release onboarding/task-copy-review'
notes:
  - 'Without an explicit argument, resolves the current active task or feature owned by the caller agent.'
  - 'With SOMANAGER_ROLE=manager, <entry-ref> is mandatory and may target an unassigned entry.'
  - 'Developer and reviewer callers remain restricted to entries assigned to the caller agent.'
  - 'Only works when the active entry has no development work yet.'
  - 'A parent feature cannot be released while local child tasks are still active under it.'
