description: 'Merge one backlog entry'
arguments:
  -
    name: '<entry-ref>'
    description: 'Entry reference to merge'
options:
  -
    name: '--body-file'
    description: 'Optional local file used to update the PR body before a feature merge'
examples:
  - 'SOMANAGER_AGENT=cp-01 php scripts/backlog.php entry-merge delete-question-reply'
  - 'SOMANAGER_AGENT=cp-01 php scripts/backlog.php entry-merge onboarding/task-copy-review'
  - 'SOMANAGER_AGENT=cp-01 php scripts/backlog.php entry-merge delete-question-reply --body-file local/tmp/pr_body.md'
notes:
  - 'The caller agent (SOMANAGER_AGENT) identifies the reviewer performing the merge; it is never used to resolve a developer-owned task.'
  - 'A task merge must use the full <entry-ref>. A short task slug is refused even when it is unique.'
  - 'Before merging, the command prints the resolved type, target, merge target, and equivalent legacy command.'
  - 'entry-merge dispatches internally based on whether the ref contains a `/`: refs with a `/` are task merges; refs without are feature merges.'
  - 'After a successful feature merge to main, the command fetches origin/main and advances local main in best-effort mode. A failure to sync local main is reported as a warning and does not interrupt the cleanup.'
