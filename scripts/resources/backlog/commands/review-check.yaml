description: 'Run reviewer mechanical checks on a feature or task'
arguments:
  -
    name: '<entry-ref>'
    description: 'Entry reference to inspect'
examples:
  - 'SOMANAGER_AGENT=r01 php scripts/backlog.php review-check delete-question-reply'
  - 'SOMANAGER_AGENT=r01 php scripts/backlog.php review-check onboarding/task-copy-review'
notes:
  - 'Use <entry-ref> for both feature and child task entries.'
  - 'Short task references (bare task slug without the parent feature) are refused; use <entry-ref>.'
  - 'The entry must be in the review or reviewing stage.'
  - 'Before mechanical results, the command prints `Entry-ref:` and `Branch:`; copy `Entry-ref:` for follow-up commands.'
  - 'On mechanical review failure, the entry is automatically rejected with generated review notes.'
