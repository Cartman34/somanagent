description: 'Remove the current agent assignment from one active backlog entry (feature or task)'
arguments:
  -
    name: '[<entry-ref>]'
    description: 'Optional explicit reference. Without it, the command resolves the caller developer single active entry.'
options:
  -
    name: '--developer'
    description: 'Caller developer code. With an explicit reference, this is not used to select the entry assignment to remove.'
examples:
  - 'SOMANAGER_ROLE=developer SOMANAGER_AGENT=agent-01 php scripts/backlog.php unassign --agent agent-01'
  - 'SOMANAGER_ROLE=manager php scripts/backlog.php unassign delete-question-reply --agent manager-01'
  - 'SOMANAGER_ROLE=manager php scripts/backlog.php unassign delete-question-reply/cleanup --agent manager-01'
notes:
  - 'The caller role is controlled by `SOMANAGER_ROLE`.'
  - 'With `SOMANAGER_ROLE=developer`, `SOMANAGER_AGENT` must match `--developer` and the developer may only unassign its own active entry.'
  - 'With `SOMANAGER_ROLE=manager`, an explicit reference may target an entry assigned to any developer agent.'
  - 'A plain slug that matches both a feature and a task is rejected as ambiguous; use `<entry-ref>` to disambiguate.'
