description: 'Mark a feature as blocked'
arguments:
  -
    name: '[<feature>]'
    description: 'Optional explicit feature slug'
examples:
  - 'SOMANAGER_AGENT=agent-01 php scripts/backlog.php feature-block'
  - 'SOMANAGER_AGENT=agent-01 php scripts/backlog.php feature-block delete-question-reply'
notes:
  - 'Without an explicit feature argument, resolves the single active feature assigned to the caller agent.'
  - 'If the feature already has a PR, the command updates the PR title to include the blocked marker.'
