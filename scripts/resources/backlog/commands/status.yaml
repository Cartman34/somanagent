description: 'Print the current backlog and worktree status for one agent, feature, or child task'
arguments:
  -
    name: '[<feature|feature/task>]'
    description: 'Optional explicit feature slug or full child task reference'
options:
  -
    name: '--agent'
    description: 'Resolve the active task or feature owned by this agent'
examples:
  - 'php scripts/backlog.php status --agent agent-01'
  - 'php scripts/backlog.php status delete-question-reply'
  - 'php scripts/backlog.php status delete-question-reply/copy-review'
notes:
  - 'With `--agent`, prints the active task separately from the parent feature.'
  - 'With `<feature/task>`, resolves and displays the child task entry directly.'
  - 'The worktree section reports absent, clean, dirty, detached, inconsistent, orphan, or prunable.'
  - 'Task and feature next actions are printed separately so agents do not confuse task review with feature review.'
  - 'When stored reviewer notes exist for the active entry, status appends a single hint line pointing to `review-notes`. The notes themselves are never printed by `status`.'
