description: 'Local backlog workflow orchestrator.'
options:
  -
    name: '--body-file'
    description: 'Path to a local file used for PR or review body content when required'
  -
    name: '--branch-type'
    description: 'Override branch type for work-start: feat or fix'
  -
    name: '--position'
    description: 'Insertion position for entry-create: start, index, end (default: end)'
  -
    name: '--index'
    description: '1-based target position used when --position=index'
  -
    name: '--force'
    description: 'Allow taking a task that is already reserved'
  -
    name: '--worktree-dir'
    description: 'Override managed worktrees root directory (test mode only, must be in local/tests/test-worktrees/)'
examples:
  - 'php scripts/backlog.php status'
  - 'php scripts/backlog.php base-update my-feature'
  - 'php scripts/backlog.php entry-create --body-file=local/tmp/new-task.md'
  - 'php scripts/backlog.php todo-list'
  - 'php scripts/backlog.php task-remove my-feature'
  - 'php scripts/backlog.php task-remove my-feature/my-task'
  - 'php scripts/backlog.php review-request'
  - 'php scripts/backlog.php entry-merge onboarding/task-copy-review'
  - 'php scripts/backlog.php review-approve onboarding/task-copy-review'
  - 'php scripts/backlog.php rework onboarding/task-copy-review'
  - 'php scripts/backlog.php work-start'
  - 'php scripts/backlog.php work-start my-feature'
  - 'php scripts/backlog.php work-start my-feature/my-task'
  - 'php scripts/backlog.php entry-release'
  - 'php scripts/backlog.php entry-merge my-feature/my-task'
  - 'php scripts/backlog.php list'
  - 'php scripts/backlog.php worktree-list'
  - 'php scripts/backlog.php worktree-clean --dry-run'
  - 'php scripts/backlog.php worktree-restore --developer d01'
  - 'php scripts/backlog.php review-list'
  - 'php scripts/backlog.php review-next'
  - 'php scripts/backlog.php review-next my-feature'
  - 'php scripts/backlog.php review-cancel my-feature'
  - 'php scripts/backlog.php review-approve delete-question-reply --body-file local/tmp/pr_body.md'
