description: 'Remove installed dependencies, respecting pre_existing flags and on_uninstall_pre_existing policy.'
options:
  - name: '--restore'
    description: 'One-shot: treat all pre-existing deps as restore (downgrade to previous_version when set). Mutually exclusive with --keep.'
  - name: '--keep'
    description: 'One-shot: treat all pre-existing deps as keep (leave current version intact). Mutually exclusive with --restore.'
  - name: '--preview-only'
    description: 'Show the uninstall plan and exit without applying. Mutually exclusive with --dry-run.'
  - name: '--dry-run'
    description: 'Show the plan and simulated commands, then exit without applying. Mutually exclusive with --preview-only.'
  - name: '--force'
    description: 'Apply without asking for confirmation (preview still printed for traceability).'
examples:
  - 'php scripts/setup.php uninstall'
  - 'php scripts/setup.php uninstall --preview-only'
  - 'php scripts/setup.php uninstall --restore'
  - 'php scripts/setup.php uninstall --dry-run'
  - 'php scripts/setup.php uninstall --force'
notes:
  - 'pre_existing=false entries are always removed.'
  - 'pre_existing=true entries follow the policy chain: --restore/--keep flag > lockfile override (dep-config) > manifest dep > manifest default > framework default (keep).'
  - 'restore: downgrades to previous_version when set; removes without downgrade when previous_version is null.'
  - 'Side effects (apt repos, GPG keys) are removed only if no remaining dep still relies on them.'
  - 'Set per-dep policy with: php scripts/setup.php dep-config set <dep> on_uninstall_pre_existing <keep|restore>.'
  - '--restore and --keep are mutually exclusive.'
  - '--preview-only and --dry-run are mutually exclusive.'
