description: 'Start an AI agent session in a dedicated worktree.'
arguments:
  - name: '<client>'
    description: 'AI client to launch: claude, codex, opencode, gemini'
options:
  - name: '--developer'
    description: 'Launch as developer role'
  - name: '--reviewer'
    description: 'Launch as reviewer role (reuses the developer WA)'
  - name: '--manager'
    description: 'Launch as manager role'
  - name: '--code=<code>'
    description: 'Explicit agent code (e.g. d10, r10). Omit to auto-allocate (auto-allocation starts at 10; 01-09 reserved for explicit assignment).'
  - name: '--tier=<tier>'
    description: 'Model tier override: economy, balanced, premium.'
  - name: '--effort=<effort>'
    description: 'Reasoning effort override: low, medium, high.'
  - name: '--model=<model>'
    description: 'Raw model name override passed directly to the client; mutually exclusive with --tier.'
  - name: '--reset'
    description: 'Remove and recreate the worktree before launching (developer only; refuses if dirty)'
  - name: '--feature=<slug>'
    description: 'Reviewer: target the feature entry at stage=review with this slug'
  - name: '--task=<feature/task>'
    description: 'Reviewer: target the task entry at stage=review with this reference'
  - name: '--developer=<dXX>'
    description: 'Reviewer: target the active entry assigned to this developer code'
  - name: '--force'
    description: 'Reviewer: proceed even when another reviewer session is active in the target WA'
examples:
  - 'php scripts/backlog-agent.php start claude --developer'
  - 'php scripts/backlog-agent.php start claude --developer --code=d10'
  - 'php scripts/backlog-agent.php start codex --developer --tier=economy --effort=low'
  - 'php scripts/backlog-agent.php start gemini --manager --model=gemini-2.5-pro'
  - 'php scripts/backlog-agent.php start claude --reviewer'
  - 'php scripts/backlog-agent.php start claude --reviewer --feature=my-feature'
  - 'php scripts/backlog-agent.php start claude --reviewer --task=my-feature/my-task'
  - 'php scripts/backlog-agent.php start claude --reviewer --developer=d10'
  - 'php scripts/backlog-agent.php start claude --reviewer --developer=d10 --force'
notes:
  - 'Exactly one role flag (--developer, --reviewer, --manager) is required.'
  - 'Default model profile: developer=balanced+medium, reviewer=balanced+medium, manager=premium+medium.'
  - '--model bypasses tier model selection while the canonical effort still applies on clients that support effort.'
  - 'When a client does not support effort, --effort=low/high is ignored and prints a warning.'
  - 'Developer: if the agent has no active entry, the todo list is iterated in order and work-start is attempted for each candidate until one succeeds. If a candidate was concurrently claimed by another agent, the launcher moves silently to the next one (retry bounded by list length). If the agent already has an active entry, the session resumes on that entry without consuming from the todo queue.'
  - 'Reviewer: the active list is iterated in order and review-next is attempted for each review-stage entry whose developer WA is not already claimed by a running reviewer session. If a candidate was concurrently claimed by another reviewer, the launcher moves silently to the next one (retry bounded by list length). If the reviewer already owns a reviewing entry, that entry is reused instead.'
  - 'After a developer auto-pick or reviewer auto-claim, the role launch prompt from scripts/resources/backlog-agent/launch-prompts.yaml is sent as the initial user message.'
  - 'Manager: no auto-pick; runs directly in WP without a WA.'
  - 'Session driver is selected by BACKLOG_AGENT_SESSION_DRIVER=tmux|direct (default: tmux).'
  - 'Run php scripts/setup.php install --preview-only to verify system dependencies (e.g. tmux) before launching.'
  - 'Each client receives permission flags at launch so agents can operate without interactive approval prompts: claude gets --permission-mode acceptEdits, codex gets --ask-for-approval never, gemini gets --approval-mode auto_edit --skip-trust, opencode gets --dangerously-skip-permissions. These flags are CLI-scoped and do not modify any global user config.'
