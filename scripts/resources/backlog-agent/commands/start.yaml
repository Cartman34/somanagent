description: 'Start an AI agent session in a dedicated worktree.'
arguments:
  - name: '<client>'
    description: 'AI client to launch: claude, codex, opencode, gemini'
options:
  - name: '--developer'
    description: 'Launch as developer role'
  - name: '--reviewer'
    description: 'Launch as reviewer role (reuses the developer WA)'
  - name: '--manager'
    description: 'Launch as manager role'
  - name: '--code=<code>'
    description: 'Explicit agent code (e.g. d10, r10). Omit to auto-allocate (auto-allocation starts at 10; 01-09 reserved for explicit assignment).'
  - name: '--reset'
    description: 'Remove and recreate the worktree before launching (developer only; refuses if dirty)'
  - name: '--feature=<slug>'
    description: 'Reviewer: target the feature entry at stage=review with this slug'
  - name: '--task=<feature/task>'
    description: 'Reviewer: target the task entry at stage=review with this reference'
  - name: '--developer=<dXX>'
    description: 'Reviewer: target the active entry assigned to this developer code'
  - name: '--force'
    description: 'Reviewer: proceed even when another reviewer session is active in the target WA'
examples:
  - 'php scripts/backlog-agent.php start claude --developer'
  - 'php scripts/backlog-agent.php start claude --developer --code=d10'
  - 'php scripts/backlog-agent.php start claude --reviewer'
  - 'php scripts/backlog-agent.php start claude --reviewer --feature=my-feature'
  - 'php scripts/backlog-agent.php start claude --reviewer --task=my-feature/my-task'
  - 'php scripts/backlog-agent.php start claude --reviewer --developer=d10'
  - 'php scripts/backlog-agent.php start claude --reviewer --developer=d10 --force'
notes:
  - 'Exactly one role flag (--developer, --reviewer, --manager) is required.'
  - 'Session driver is selected by BACKLOG_AGENT_SESSION_DRIVER=tmux|direct (default: tmux).'
  - 'Run php scripts/setup.php install --preview-only to verify system dependencies (e.g. tmux) before launching.'
