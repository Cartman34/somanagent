description: 'List active agent sessions.'
options:
  - name: '--running'
    description: 'Show only sessions with a live PID'
  - name: '--all'
    description: 'Include stale entries (PID dead)'
examples:
  - 'php scripts/backlog-agent.php list'
  - 'php scripts/backlog-agent.php list --running'
  - 'php scripts/backlog-agent.php list --all'
notes:
  - 'Without a filter flag, shows all entries including stale ones.'
