description: 'Check the health of running Docker services.'
examples:
  - 'php scripts/server.php health'
notes:
  - 'Always checks PostgreSQL (pg_isready -h localhost -p 5432) and Redis (redis-cli ping).'
  - 'If the nginx container is running, also checks the API at http://localhost:8080/api/health.'
  - 'If the mercure container is running, also checks http://localhost:8080/.well-known/mercure.'
  - 'Exit code: 0 if all checked services are healthy, 1 otherwise.'
  - 'Read-only: safe to use from agent scripts before running migrate.php.'
