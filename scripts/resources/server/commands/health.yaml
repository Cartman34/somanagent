description: 'Check the health of running Docker services.'
examples:
  - 'php scripts/server.php health'
notes:
  - 'Always checks PostgreSQL through a native PDO connection to localhost:5432 and Redis through a raw TCP PING to localhost:6379.'
  - 'Does not require pg_isready or redis-cli on the host.'
  - 'If the nginx container is running, also checks the API at http://localhost:8080/api/health through PHP streams.'
  - 'If the mercure container is running, also checks http://localhost:8080/.well-known/mercure through PHP streams.'
  - 'Exit code: 0 if all checked services are healthy, 1 otherwise.'
  - 'Read-only: safe to use from agent scripts before running migrate.php.'
