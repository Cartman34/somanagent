description: 'Start Docker Compose services.'
options:
  - name: '--minimal'
    description: 'Start only db and redis (skip full-profile services php, worker, nginx, node, mercure)'
  - name: '--preview-only'
    description: 'Show the planned operation and exit without applying. Mutually exclusive with --dry-run.'
  - name: '--dry-run'
    description: 'Show the planned operation and simulated commands, then exit without applying. Mutually exclusive with --preview-only.'
  - name: '--force'
    description: 'Apply without asking for confirmation (preview still printed)'
examples:
  - 'php scripts/server.php start'
  - 'php scripts/server.php start --minimal'
  - 'php scripts/server.php start --force'
  - 'php scripts/server.php start --preview-only'
  - 'php scripts/server.php start --dry-run'
notes:
  - 'Without --minimal, starts all services: php, worker, nginx, node, mercure, db, redis (profile full).'
  - '--minimal starts only db and redis — useful for agent environments that do not need the full stack.'
  - 'Idempotent: already-running services are not restarted by docker compose up -d.'
