description: 'Create a new pull request'
options:
  -
    name: '--title'
    description: 'PR title (required)'
  -
    name: '--head'
    description: 'Source branch (required)'
  -
    name: '--base'
    description: 'Target branch (default: main)'
  -
    name: '--body'
    description: 'PR body text'
  -
    name: '--body-file'
    description: 'Path to a file for PR body (preferred; file is deleted after use)'
examples:
  - 'php scripts/toolkit/github.php pr-create --title "Fix login" --head fix/login --body "Description..."'
  - 'php scripts/toolkit/github.php pr-create --title "Fix login" --head fix/login --body-file local/tmp/pr_body.md'
notes:
  - '--title and --head are required'
  - '--body-file is preferred over --body to avoid shell quoting issues'
