parameters:
    skills_dir: '%kernel.project_dir%/../skills'
    messenger_agent_task_max_retries: 3

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Enum/'
            - '../src/ValueObject/'
            - '../src/Kernel.php'

    # Adapters IA — taggés pour AgentPortRegistry
    App\Adapter\AI\ClaudeApiAdapter:
        arguments:
            $apiKey: '%env(CLAUDE_API_KEY)%'
        tags: ['app.agent_adapter']

    App\Adapter\AI\ClaudeCliAdapter:
        tags: ['app.agent_adapter']

    App\Service\AgentPortRegistry:
        arguments:
            $adapters: !tagged_iterator app.agent_adapter

    # Paramètre skills_dir injecté dans SkillService
    App\Service\SkillService:
        arguments:
            $skillsDir: '%skills_dir%'

    App\Service\AgentTaskExecutionService:
        arguments:
            $messengerAgentTaskMaxRetries: '%messenger_agent_task_max_retries%'
