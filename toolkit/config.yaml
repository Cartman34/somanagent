# Toolkit project configuration — read by the generic toolkit runners.
# @see scripts/toolkit/doc/maintaining/config.md
appName: somanagent
appLabel: 'somanagent'

# Project scopes: name -> directory prefixes (membership). Single source of the project's
# areas, consumed by backlog (entry --scope=<name>) and by tooling. Tools that target a scope
# accept either a scope name or a raw path.
scopes:
  backend:
    - backend/
  frontend:
    - frontend/
  scripts:
    - scripts/
  scripts-and-doc:
    - scripts/
    - doc/

# Directories holding executable scripts (help, fix-permissions).
scripts_dirs:
  - scripts/toolkit

# Filename globs whose exec bit is managed under scripts_dirs (fix-permissions).
# Defaults to ["*.php"] when omitted.
permissions:
  exec_bit:
    - "*.php"

# Analysis scopes for phpstan / rector / code-refacto: name -> directories.
analysis:
  scripts:
    - scripts/src

# Composer roots (name -> path relative to the project root): PSR-4 source for code-refacto.
composers:
  scripts: scripts

# Validation rules (validate-files): file pattern -> validators (cumulative).
# Built-in toolkit validators: php-syntax, exec-bit.
# App-specific validators are declared under `validators` (name -> FQCN).
validations:
  - match: "scripts/**/*.php"
    run: [php-syntax, exec-bit]
  - match: "doc/developing/openapi.yaml"
    run: [openapi-consistency]

# App-specific validator registry (name -> FQCN). Built-ins need no entry here.
validators:
  openapi-consistency: Sowapps\SoManAgent\Script\Validation\OpenApiConsistencyValidator

# Symfony translation validation (Sowapps\Toolkit\Symfony): declared keys vs source usages.
# catalog = where keys are declared; sources = where usages are scanned, each bound to extractors;
# extractors = app-specific usage extractors (name -> FQCN, implementing the toolkit contract).
translations:
  catalog:
    dir: backend/translations
    locale: fr
  sources:
    - dirs: [frontend/src]
      exts: [ts, tsx]
      extractors: [frontend]
    - dirs: [backend/src]
      exts: [php]
      extractors: [backend]
  extractors:
    frontend: Sowapps\SoManAgent\Script\Validation\FrontendTranslationExtractor
    backend: Sowapps\SoManAgent\Script\Validation\BackendTranslationExtractor

# Docker module (Sowapps\Toolkit\Docker): server (start/stop/status/health) + logs runners.
# container_prefix = Compose project name ; default_profile = profile started by `server start`.
docker:
  container_prefix: somanagent_
  default_profile: full
  health:
    checks:
      - { type: postgres, dsn: 'pgsql:host=localhost;port=5432;dbname=somanagent', user: somanagent, password: somanagent }
      - { type: redis, address: 'tcp://localhost:6379' }
      - { type: http, name: API,     url: 'http://localhost:8080/api/health',         requires: nginx }
      - { type: http, name: Mercure, url: 'http://localhost:8080/.well-known/mercure', requires: mercure }
  banner: |
    API  →  http://localhost:8080/api/health
    UI   →  http://localhost:5173
    DB   →  localhost:5432  (somanagent / somanagent)

# Symfony console module (Sowapps\Toolkit\Symfony): run bin/console inside the PHP Compose service.
symfony:
  service: php
  console: php bin/console

# Database module (Sowapps\Toolkit\Symfony db runner): psql + Doctrine inside Compose services.
# Doctrine commands reuse the symfony section above.
database:
  service: db
  psql:
    user: somanagent
    database: somanagent

# Optional tool config-file overrides (binaries ship with the toolkit).
# tools:
#   phpstan:
#     config: config/phpstan.neon
#   rector:
#     config: config/rector.php
