components:
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AgentIdPath:
      name: agentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ConnectorPath:
      name: connector
      in: path
      required: true
      schema:
        type: string
    ProjectIdPath:
      name: projectId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MessageIdPath:
      name: messageId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    LogIdPath:
      name: logId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SkillIdPath:
      name: skillId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TicketIdPath:
      name: ticketId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  requestBodies:
    ArbitraryJsonBody:
      required: false
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ArbitraryJsonObject'
    ProjectCreatePayload:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProjectCreatePayload'
    ProjectUpdatePayload:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProjectUpdatePayload'
  responses:
    Ok:
      description: 'Successful response'
    Created:
      description: 'Resource created'
    Accepted:
      description: 'Request accepted for asynchronous processing'
    NoContent:
      description: 'Resource deleted successfully'
  schemas:
    RoleRef:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
      required:
        - id
        - name
    ProjectFields:
      description: 'Common writable fields shared by project create and update payloads.'
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        repositoryUrl:
          type: string
          nullable: true
        teamId:
          type: string
          format: uuid
          nullable: true
        workflowId:
          type: string
          format: uuid
          nullable: true
        dispatchMode:
          type: string
          enum: [auto, manual]
        defaultTicketRoleId:
          type: string
          format: uuid
          nullable: true
          description: 'Role assigned automatically to new UserStory/Bug tickets. Pass null to clear.'
    ProjectCreatePayload:
      description: 'Payload for POST /api/projects. name, teamId, and workflowId are required.'
      allOf:
        - $ref: '#/components/schemas/ProjectFields'
        - required: [name, teamId, workflowId]
    ProjectUpdatePayload:
      description: 'Payload for PATCH /api/projects/{id}. All fields are optional; omitted fields keep their current value.'
      allOf:
        - $ref: '#/components/schemas/ProjectFields'
    ProjectRef:
      description: 'Lightweight project reference embedded in list and update responses.'
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        team:
          type: object
          nullable: true
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
        workflow:
          type: object
          nullable: true
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
        dispatchMode:
          type: string
          enum: [auto, manual]
        defaultTicketRole:
          nullable: true
          description: 'Role assigned automatically to new UserStory/Bug tickets, or null if not configured.'
          allOf:
            - $ref: '#/components/schemas/RoleRef'
      required:
        - id
        - name
        - dispatchMode
    ProjectSummary:
      description: 'Project row as returned by GET /api/projects. modules is a count.'
      allOf:
        - $ref: '#/components/schemas/ProjectRef'
        - type: object
          properties:
            description:
              type: string
              nullable: true
            repositoryUrl:
              type: string
              nullable: true
            modules:
              type: integer
              description: 'Number of modules attached to the project.'
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time
          required:
            - modules
            - createdAt
            - updatedAt
    ProjectCreated:
      description: 'Project as returned by POST /api/projects. No modules or updatedAt.'
      allOf:
        - $ref: '#/components/schemas/ProjectRef'
        - type: object
          properties:
            description:
              type: string
              nullable: true
            repositoryUrl:
              type: string
              nullable: true
            createdAt:
              type: string
              format: date-time
          required:
            - createdAt
    ProjectDetail:
      description: 'Project as returned by GET /api/projects/{id}. modules is an array of module objects.'
      allOf:
        - $ref: '#/components/schemas/ProjectRef'
        - type: object
          properties:
            description:
              type: string
              nullable: true
            repositoryUrl:
              type: string
              nullable: true
            modules:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  name:
                    type: string
                  description:
                    type: string
                    nullable: true
                  repositoryUrl:
                    type: string
                    nullable: true
                  stack:
                    type: string
                    nullable: true
                  status:
                    type: string
                    enum: [active, archived]
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time
          required:
            - modules
            - createdAt
            - updatedAt
    ArbitraryJsonObject:
      type: object
      additionalProperties: true
    Ticket:
      type: object
      properties:
        id:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        type:
          type: string
          enum: [user_story, bug]
        title:
          type: string
        description:
          type: string
          nullable: true
        initialRequest:
          type: string
          nullable: true
          description: 'Original description entered by the user at ticket creation time, before any agent rewrites it.'
        initialTitle:
          type: string
          nullable: true
          description: 'Original title entered by the user at ticket creation time, before any agent rewrites it.'
        status:
          type: string
        priority:
          type: string
        progress:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - projectId
        - type
        - title
        - status
        - priority
        - progress
        - createdAt
        - updatedAt
