openapi: 3.1.0
info:
  title: 'SoManAgent API'
  version: 1.0.0
  description: 'Versioned OpenAPI contract for the SoManAgent backend. This specification is spec-first: operations may be documented ahead of implementation when they explicitly set `x-somanagent-implemented` to `false`.'
servers:
  - url: 'http://localhost:8080'
tags:
  - name: Health
  - name: Projects
  - name: Tickets
  - name: 'Ticket Tasks'
  - name: Chat
  - name: Agents
  - name: Teams
  - name: Roles
  - name: Skills
  - name: Workflows
  - name: Features
  - name: Logs
  - name: Audit
  - name: Tokens
  - name: UI
