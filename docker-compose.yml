services:

  # ============================================================
  # PHP-FPM (Symfony API)
  # ============================================================
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: somanagent_php
    restart: unless-stopped
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
      - ./skills:/var/www/skills
      - ./.docker/claude/shared/.claude:/claude-home/.claude
      - ./.docker/claude/shared/.claude.json:/claude-home/.claude.json
      - ./.docker/codex/shared/.codex:/codex-home/.codex
      - ./.docker/opencode/shared/.local:/opencode-home/.local
    environment:
      - APP_ENV=${APP_ENV:-dev}
      # Claude CLI reads ANTHROPIC_API_KEY; we map it from our CLAUDE_API_KEY
      - ANTHROPIC_API_KEY=${CLAUDE_API_KEY:-}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - somanagent

  # ============================================================
  # Messenger worker (agent task consumer)
  # ============================================================
  worker:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: somanagent_worker
    restart: unless-stopped
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
      - ./skills:/var/www/skills
      - ./.docker/claude/shared/.claude:/claude-home/.claude
      - ./.docker/claude/shared/.claude.json:/claude-home/.claude.json
      - ./.docker/codex/shared/.codex:/codex-home/.codex
      - ./.docker/opencode/shared/.local:/opencode-home/.local
    environment:
      - APP_ENV=${APP_ENV:-dev}
      - ANTHROPIC_API_KEY=${CLAUDE_API_KEY:-}
    env_file:
      - .env
    command: php bin/console messenger:consume async --time-limit=3600 --memory-limit=256M
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      php:
        condition: service_started
    networks:
      - somanagent

  # ============================================================
  # Nginx (reverse proxy)
  # ============================================================
  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    container_name: somanagent_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/backend
    depends_on:
      - php
    networks:
      - somanagent

  # ============================================================
  # Node.js (React frontend dev server + skills CLI)
  # ============================================================
  node:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    container_name: somanagent_node
    restart: unless-stopped
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - ./skills:/skills
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    networks:
      - somanagent

  # ============================================================
  # Mercure hub (standard realtime transport)
  # ============================================================
  mercure:
    image: dunglas/mercure:v0.15
    container_name: somanagent_mercure
    restart: unless-stopped
    environment:
      SERVER_NAME: ':80'
      MERCURE_PUBLISHER_JWT_KEY: ${MERCURE_PUBLISHER_JWT_KEY:-!ChangeThisMercureHubJWTSecretKey!}
      MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_SUBSCRIBER_JWT_KEY:-!ChangeThisMercureHubJWTSecretKey!}
      MERCURE_EXTRA_DIRECTIVES: |-
        anonymous
        subscriptions
        transport_url bolt:///data/mercure.db
    volumes:
      - mercure_data:/data
    networks:
      - somanagent

  # ============================================================
  # Redis (Messenger transport queue)
  # ============================================================
  redis:
    build:
      context: ./docker/redis
      dockerfile: Dockerfile
    container_name: somanagent_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - somanagent

  # ============================================================
  # PostgreSQL
  # ============================================================
  db:
    build:
      context: ./docker/db
      dockerfile: Dockerfile
    container_name: somanagent_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-somanagent}
      POSTGRES_USER: ${POSTGRES_USER:-somanagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      # Subdirectory inside the mount avoids "directory not empty" on Windows/WSL
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./docker/data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-somanagent}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - somanagent

networks:
  somanagent:
    driver: bridge

volumes:
  redis_data:
  mercure_data:
